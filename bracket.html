<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FIFA 2026 — Radial Bracket</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #12121e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      gap: 0.6rem;
      color: #cdd6f4;
    }
    h1 { font-size: 1rem; font-weight: bold; letter-spacing: 0.15em; text-transform: uppercase; color: #888; }
    #controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; justify-content: center; }
    select {
      background: #1e1e2e; color: #cdd6f4; border: 1px solid #45475a;
      border-radius: 5px; padding: 5px 10px; font-size: 12px; cursor: pointer;
    }
    select:focus { outline: none; border-color: #89b4fa; }
    button {
      background: #1e1e2e;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 5px;
      padding: 5px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: #313244; }
    button.active { background: #89b4fa22; border-color: #89b4fa; color: #89b4fa; }
    #viz { overflow: visible; }
    #viz.predict-mode .clickable { cursor: crosshair; }
    #tooltip {
      position: fixed;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 7px 12px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      color: #cdd6f4;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <h1 id="title">World Cup 2026</h1>
  <div id="controls">
    <select id="year-select"></select>
    <button id="btn-ai">📊 AI Pick</button>
    <button id="btn-flip">🪙 Flip</button>
    <button id="btn-predict">🔮 Manual</button>
    <button id="btn-reset">↺ Reset</button>
  </div>
  <svg id="viz"></svg>
  <div id="tooltip"></div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script>
    const TOURNAMENTS = [
      {year:2026,host:'Canada/Mexico/USA'},{year:2022,host:'Qatar'},
      {year:2018,host:'Russia'},{year:2014,host:'Brazil'},
      {year:2010,host:'South Africa'},{year:2006,host:'Germany'},
      {year:2002,host:'Korea/Japan'},{year:1998,host:'France'},
      {year:1994,host:'USA'},{year:1990,host:'Italy'},
      {year:1986,host:'Mexico'},{year:1982,host:'Spain'},
      {year:1978,host:'Argentina'},{year:1974,host:'W. Germany'},
      {year:1970,host:'Mexico'},{year:1966,host:'England'},
      {year:1962,host:'Chile'},{year:1958,host:'Sweden'},
      {year:1954,host:'Switzerland'},{year:1950,host:'Brazil'},
      {year:1938,host:'France'},{year:1934,host:'Italy'},
      {year:1930,host:'Uruguay'},
    ]

    let currentYear = 2026
    const dataUrl = y => `https://raw.githubusercontent.com/openfootball/worldcup.json/master/${y}/worldcup.json`

    // Normalise round names across eras → canonical form
    function normaliseRound(r) {
      const l = r.toLowerCase()
      if (l.includes('round of 32'))                            return {key:r, norm:'Round of 32', short:'R32', size:16}
      if (l.includes('round of 16'))                            return {key:r, norm:'Round of 16', short:'R16', size:8 }
      if (l.includes('quarter') && !l.includes('replay') && !l.includes('third')) return {key:r, norm:'Quarter-finals', short:'QF', size:4 }
      if (l.includes('semi'))                                   return {key:r, norm:'Semi-finals',  short:'SF', size:2 }
      if (l.trim() === 'final')                                 return {key:r, norm:'Final',        short:'Final', size:1}
      return null
    }

    function detectRoundConfig(data) {
      const seen = {}, order = ['Round of 32','Round of 16','Quarter-finals','Semi-finals','Final']
      for (const m of data.matches) {
        const n = normaliseRound(m.round)
        if (n && !seen[n.norm]) seen[n.norm] = n
      }
      return order.filter(k=>seen[k]).map(k=>({
        key: seen[k].key,   // original key for lookup
        norm: k,
        short: seen[k].short,
        size: seen[k].size,
      }))
    }

    // Dynamic radii: evenly spaced, teams always at TEAM_R
    const TEAM_R = 440
    function buildRadii(numRounds) {
      return Array.from({length: numRounds+1}, (_,i) => Math.round(TEAM_R * i / numRounds))
    }

    let ROUND_CONFIG = []
    let RADII = []

    const ISO = {
      // Current teams
      "Algeria":"dz","Argentina":"ar","Australia":"au","Austria":"at",
      "Belgium":"be","Bolivia":"bo","Brazil":"br",
      "Canada":"ca","Cape Verde":"cv","Chile":"cl","China":"cn","Colombia":"co",
      "Costa Rica":"cr","Croatia":"hr","Cuba":"cu",
      "Czech Republic":"cz","Denmark":"dk","DR Congo":"cd",
      "Ecuador":"ec","Egypt":"eg","El Salvador":"sv","England":"gb-eng",
      "France":"fr","Germany":"de","Ghana":"gh","Greece":"gr",
      "Haiti":"ht","Honduras":"hn","Hungary":"hu",
      "Iceland":"is","Iran":"ir","Iraq":"iq","Ireland":"ie","Israel":"il",
      "Italy":"it","Jamaica":"jm","Japan":"jp","Kuwait":"kw",
      "Mexico":"mx","Morocco":"ma","Netherlands":"nl","New Zealand":"nz",
      "Nigeria":"ng","North Korea":"kp","Northern Ireland":"gb-nir",
      "Norway":"no","Panama":"pa","Paraguay":"py","Peru":"pe",
      "Poland":"pl","Portugal":"pt","Qatar":"qa","Romania":"ro",
      "Russia":"ru","Saudi Arabia":"sa","Scotland":"gb-sct",
      "Senegal":"sn","Serbia":"rs","Slovakia":"sk","Slovenia":"si",
      "South Africa":"za","South Korea":"kr","Spain":"es","Sweden":"se",
      "Switzerland":"ch","Togo":"tg","Trinidad and Tobago":"tt",
      "Tunisia":"tn","Turkey":"tr","Ukraine":"ua",
      "United Arab Emirates":"ae","Uruguay":"uy","USA":"us",
      "United States":"us","Wales":"gb-wls","Ivory Coast":"ci",
      // Historical / alternate names
      "Côte d'Ivoire":"ci","Bosnia-Herzegovina":"ba","Bosnia & Herzegovina":"ba",
      "Czechoslovakia":"cz","West Germany":"de","East Germany":"de",
      "Soviet Union":null,"Yugoslavia":"rs","Serbia and Montenegro":"rs",
      "Zaire":"cd","Dutch East Indies":"id","Türkiye":"tr","DR Congo":"cd",
    }

    // ── Team strength ratings (1-100) ─────────────────────────────────────────
    const STRENGTH = {
      'Argentina':95,'France':91,'Brazil':88,'Spain':86,'England':84,
      'Germany':83,'Portugal':82,'Netherlands':79,'Belgium':76,
      'Morocco':73,'Croatia':73,'Uruguay':73,'Switzerland':70,
      'Colombia':71,'USA':70,'Japan':69,'Mexico':67,'Norway':67,
      'Sweden':67,'South Korea':66,'Poland':66,'Denmark':65,
      'Canada':65,'Serbia':65,'Austria':65,'Paraguay':62,
      'Australia':62,'Ecuador':62,'Algeria':59,'Ivory Coast':61,
      'Senegal':60,'Ghana':58,'Egypt':57,'Romania':57,'Chile':63,
      'South Africa':53,'Bosnia & Herzegovina':54,'DR Congo':52,
      'Saudi Arabia':52,'Cape Verde':47,'Thailand':35,'Tunisia':54,
    }

    function teamStrength(name) { return STRENGTH[name] ?? 55 }

    function predictMatch(home, away, randomness) {
      const sh = teamStrength(home), sa = teamStrength(away)
      const skillProb = sh / (sh + sa)
      const p = skillProb * (1 - randomness) + 0.5 * randomness
      return Math.random() < p ? home : away
    }

    function runPredictions(baseAligned, randomness) {
      const newPreds = {}
      // Deep copy to work with
      const rounds = baseAligned.map(r=>({...r, matches:r.matches.map(m=>({...m}))}))

      for (let ri = 0; ri < rounds.length; ri++) {
        rounds[ri].matches.forEach((m, mi) => {
          if (m.winner) return          // real result — skip
          const h = m.home, a = m.away
          if (!h || !a) return          // both teams not yet known

          const winner = predictMatch(h, a, randomness)
          newPreds[`${ri}-${mi}`] = winner
          m.winner = winner

          // Propagate to next round so subsequent matches can be predicted
          if (ri + 1 < rounds.length) {
            const ni = Math.floor(mi/2), isHome = mi%2===0
            const next = rounds[ri+1].matches[ni]
            if (next && !next[isHome?'home':'away']) next[isHome?'home':'away'] = winner
          }
        })
      }
      return newPreds
    }

    const W = 980, H = 980, cx = W/2, cy = H/2
    const BADGE_R = 28

    // ── State ──────────────────────────────────────────────────────────────────
    let predictionMode  = false
    let userPredictions = {}
    let baseAligned     = null

    const flagUrl = t => { const iso=ISO[t]; return iso?`https://flagcdn.com/w40/${iso}.png`:null }

    // ── Parse / Align / Propagate / Predict ───────────────────────────────────
    function parseRounds(data) {
      const byRound={}
      for (const m of data.matches) { if (!byRound[m.round]) byRound[m.round]=[]; byRound[m.round].push(m) }
      const clean=t=>(t&&/^W\d+$/.test(t))?null:t
      const empty=()=>({home:null,away:null,homeScore:null,awayScore:null,pkHome:null,pkAway:null,winner:null,extra:null,isPredicted:false})
      return ROUND_CONFIG.map(cfg=>{
        const matches=(byRound[cfg.key]||[]).map(m=>{
          const s=m.score||{},ft=s.ft||[null,null],et=s.et,pk=s.p
          // Use ET score for display if available (shows final result not just FT)
          const displayScore = pk ? ft : (et || ft)
          let winner=null,extra=null
          if(ft[0]!==null){
            if(pk){extra='PK';winner=pk[0]>pk[1]?m.team1:m.team2}
            else if(et){extra='ET';winner=et[0]>et[1]?m.team1:m.team2}
            else if(ft[0]!==ft[1]){winner=ft[0]>ft[1]?m.team1:m.team2}
          }
          return {home:clean(m.team1),away:clean(m.team2),
                  homeScore:displayScore[0],awayScore:displayScore[1],
                  pkHome:pk?pk[0]:null,pkAway:pk?pk[1]:null,winner,extra,isPredicted:false}
        })
        while(matches.length<cfg.size)matches.push(empty())
        return {name:cfg.name,matches}
      })
    }

    function alignPass(outer, inner) {
      const t2m={}
      outer.matches.forEach((m,i)=>{if(m.home)t2m[m.home]=i;if(m.away)t2m[m.away]=i})
      const used=new Set(),asgn=inner.matches.map(()=>[])
      inner.matches.forEach((mi,idx)=>{
        for(const t of [mi.home,mi.away]){if(!t)continue;const i=t2m[t];if(i!==undefined&&!used.has(i)){asgn[idx].push(outer.matches[i]);used.add(i)}}
      })
      inner.matches.forEach((_,idx)=>{
        while(asgn[idx].length<2){const r=outer.matches.findIndex((_,i)=>!used.has(i));if(r===-1){asgn[idx].push({home:null,away:null,homeScore:null,awayScore:null,pkHome:null,pkAway:null,winner:null,extra:null,isPredicted:false});break}asgn[idx].push(outer.matches[r]);used.add(r)}
      })
      const no=[];asgn.forEach(p=>no.push(...p))
      outer.matches.forEach((m,i)=>{if(!used.has(i))no.push(m)})
      outer.matches=no
    }

    function alignBracket(rounds){
      const sfIdx = rounds.length - 2
      // Step 1: correct SF order so Final team1 is in SF[0] (→ LEFT)
      if (sfIdx >= 1) {
        const sf = rounds[sfIdx], final = rounds[rounds.length-1]?.matches[0]
        if (final?.home && sf?.matches[1]) {
          const m1 = sf.matches[1]
          if (m1?.winner===final.home||m1?.home===final.home||m1?.away===final.home)
            [sf.matches[0],sf.matches[1]]=[sf.matches[1],sf.matches[0]]
        }
      }
      // Step 2: align from INNER to OUTER so each pass builds on correct inner order
      for(let ii=sfIdx;ii>=1;ii--){
        alignPass(rounds[ii-1], rounds[ii])
      }
      return rounds
    }

    function propagateWinners(rounds){
      for(let oi=0;oi<rounds.length-1;oi++){
        const outer=rounds[oi],inner=rounds[oi+1]
        outer.matches.forEach((m,mi)=>{
          if(!m.winner||m.isPredicted)return
          const ni=Math.floor(mi/2),isHome=(mi%2===0),next=inner.matches[ni]
          if(next&&!next[isHome?'home':'away'])next[isHome?'home':'away']=m.winner
        })
      }
      return rounds
    }

    function applyPredictions(alignedRounds,predictions){
      const rounds=alignedRounds.map(r=>({...r,matches:r.matches.map(m=>({...m}))}))
      for(const [key,winner] of Object.entries(predictions)){
        const [ri,mi]=key.split('-').map(Number)
        const match=rounds[ri]?.matches[mi]
        if(!match||match.winner)continue
        match.winner=winner;match.isPredicted=true
        if(ri+1<rounds.length){const ni=Math.floor(mi/2),isHome=(mi%2===0),next=rounds[ri+1].matches[ni];if(next&&!next[isHome?'home':'away'])next[isHome?'home':'away']=winner}
      }
      return rounds
    }

    // ── Build hierarchy ────────────────────────────────────────────────────────
    function buildNode(rounds, ri, mi) {
      const match = rounds[ri].matches[mi]
      if (ri === 0) {
        return {
          type:'match', match, ri, mi,
          children:[
            {type:'team', name:match.home??'TBD', match, ri, mi},
            {type:'team', name:match.away??'TBD', match, ri, mi},
          ]
        }
      }
      return {
        type:'match', match, ri, mi,
        children:[
          buildNode(rounds, ri-1, mi*2),
          buildNode(rounds, ri-1, mi*2+1),
        ]
      }
    }

    function buildHierarchy(rounds) {
      // Final-only (e.g. 1974, 1978): just show two finalists
      if (rounds.length < 2) {
        const final = rounds[0]?.matches[0]
        return {
          type:'trophy',
          children:[
            { type:'team', name:final?.home??'TBD', match:final, ri:0, mi:0 },
            { type:'team', name:final?.away??'TBD', match:final, ri:0, mi:0 },
          ]
        }
      }

      const sfIdx = rounds.length - 2
      const sf    = rounds[sfIdx]
      const final = rounds[rounds.length-1]?.matches[0]

      // SF already correctly ordered by alignBracket: SF[0]=LEFT, SF[1]=RIGHT
      return {
        type:'trophy',
        children:[
          buildNode(rounds, sfIdx, 0),
          buildNode(rounds, sfIdx, 1),
        ]
      }
    }

    // ── L-shaped arm path ──────────────────────────────────────────────────────
    // From child position: radial line inward to parent radius, then arc to parent angle
    function armPath(parentNode, childNode) {
      const pa = parentNode.x - Math.PI/2
      const ca = childNode.x  - Math.PI/2
      const pr = parentNode.y
      const cr = childNode.y

      const tx = Math.cos(ca)*cr, ty = Math.sin(ca)*cr   // child pos
      const ax = Math.cos(ca)*pr, ay = Math.sin(ca)*pr   // radial endpoint at parent radius
      const px = Math.cos(pa)*pr, py = Math.sin(pa)*pr   // parent (junction) pos

      // Short arc from (ax,ay) to (px,py) along radius pr
      let dAngle = pa - ca
      while (dAngle >  Math.PI) dAngle -= 2*Math.PI
      while (dAngle < -Math.PI) dAngle += 2*Math.PI
      const sweep = dAngle > 0 ? 1 : 0

      return `M ${tx},${ty} L ${ax},${ay} A ${pr},${pr} 0 0,${sweep} ${px},${py}`
    }

    // ── Draw ───────────────────────────────────────────────────────────────────
    const svg     = d3.select('#viz').attr('width',W).attr('height',H).attr('viewBox',`0 0 ${W} ${H}`)
    const g       = svg.append('g').attr('transform',`translate(${cx},${cy})`)
    const defs    = svg.append('defs')
    const tooltip = d3.select('#tooltip')

    function showTip(event, data) {
      const m=data.match; if(!m)return
      let html=data.type==='team'?`<strong>${data.name}</strong><br/>`:``;
      const hs=m.homeScore??'–',as=m.awayScore??'–',ex=m.extra?` (${m.extra})`:''
      html+=m.homeScore!==null?`${m.home??'TBD'} ${hs}–${as} ${m.away??'TBD'}${ex}`:`${m.home??'TBD'} vs ${m.away??'TBD'}`
      if(m.winner)html+=`<br/>${m.isPredicted?'🔮':'✓'} ${m.winner}`
      if(predictionMode&&!m.winner&&data.type==='team'&&data.name!=='TBD')html+=`<br/><span style="color:#89b4fa">click to predict</span>`
      tooltip.html(html).style('left',(event.clientX+14)+'px').style('top',(event.clientY-10)+'px').style('opacity',1)
    }
    function hideTip(){tooltip.style('opacity',0)}

    function predictTeam(ri, mi, team) {
      if (!team || team === 'TBD') return
      const key = `${ri}-${mi}`
      userPredictions[key] = userPredictions[key] === team ? undefined : team
      if (!userPredictions[key]) delete userPredictions[key]
      redraw()
    }

    function handleClick(data) {
      if (!predictionMode) return
      const m = data.match; if (!m || m.winner) return
      if (data.type === 'team' && data.name !== 'TBD') predictTeam(data.ri, data.mi, data.name)
      // junction clicks handled per-side below
    }

    function draw(rounds) {
      g.selectAll('*').remove()
      defs.selectAll('*').remove()

      const root = d3.hierarchy(buildHierarchy(rounds))

      // Custom inside-out layout: child[0]=LEFT half, child[1]=RIGHT half
      // Use [π,3π] so child[0] maps to visual LEFT, child[1] to visual RIGHT
      ;(function assign(node, lo, hi, depth) {
        node.x = (lo + hi) / 2
        node.y = RADII[Math.min(depth, RADII.length-1)]
        if (!node.children) return
        const mid = (lo + hi) / 2
        assign(node.children[0], lo, mid, depth+1)
        if (node.children[1]) assign(node.children[1], mid, hi, depth+1)
      })(root, Math.PI, 3*Math.PI, 0)

      // ── Arms (radial + arc) ──
      root.descendants().filter(d=>d.children).forEach(parent=>{
        parent.children.forEach(child=>{
          const m      = child.data.match
          const isPred = m?.isPredicted
          g.append('path')
            .attr('d', armPath(parent, child))
            .attr('fill','none')
            .attr('stroke', isPred ? '#c8a830' : '#555')
            .attr('stroke-width', 1.1)
            .attr('stroke-dasharray', isPred ? '5,3' : 'none')
        })
      })

      // ── All badge circles same size ──
      function drawBadge(x, y, r, team, scoreStr, clipSuffix, strokeColor, strokeW, onClick, onHover) {
        const url    = flagUrl(team)
        const clipId = `jclip-${clipSuffix}`
        defs.append('clipPath').attr('id', clipId)
          .append('circle').attr('cx',x).attr('cy',y).attr('r',r)

        if (url && team !== 'TBD') {
          g.append('image').attr('href',url)
            .attr('x',x-r).attr('y',y-r).attr('width',r*2).attr('height',r*2)
            .attr('clip-path',`url(#${clipId})`).attr('preserveAspectRatio','xMidYMid slice')
            .attr('pointer-events','none')
        } else {
          g.append('circle').attr('cx',x).attr('cy',y).attr('r',r)
            .attr('fill','#2a2a3e').attr('pointer-events','none')
        }

        // Score overlay bar at bottom of circle
        if (scoreStr) {
          const barH = r * 0.42
          g.append('rect')
            .attr('x',x-r).attr('y',y+r-barH).attr('width',r*2).attr('height',barH)
            .attr('fill','rgba(0,0,0,0.62)').attr('clip-path',`url(#${clipId})`)
            .attr('pointer-events','none')
          g.append('text')
            .attr('x',x).attr('y',y+r-barH/2)
            .attr('text-anchor','middle').attr('dominant-baseline','middle')
            .attr('fill','#fff').attr('font-size',`${Math.max(r*0.38,8)}px`).attr('font-weight','bold')
            .attr('clip-path',`url(#${clipId})`).attr('pointer-events','none')
            .text(scoreStr)
        }

        const ring = g.append('circle').attr('cx',x).attr('cy',y).attr('r',r)
          .attr('fill','transparent').attr('stroke',strokeColor).attr('stroke-width',strokeW)
          .style('cursor', onClick ? 'crosshair' : 'default')
        if (onClick) ring.on('click', onClick)
        if (onHover) ring.on('mouseover',onHover.over).on('mousemove',onHover.move).on('mouseleave',onHover.out)
      }

      function matchScoreStr(m) {
        if (!m || m.homeScore === null) return null
        const ex = m.extra === 'PK' ? 'p' : m.extra === 'ET' ? 'e' : ''
        return `${m.homeScore}-${m.awayScore}${ex}`
      }

      root.descendants().filter(d=>d.data.type==='match').forEach((d,ji)=>{
        const a  = d.x - Math.PI/2
        const x  = Math.cos(a)*d.y, y = Math.sin(a)*d.y
        const m  = d.data.match

        const hover = { over: e=>showTip(e,d.data), move: e=>showTip(e,d.data), out: hideTip }

        if (m?.winner && d.depth < 4) {
          // Junction badges only for SF, QF, R16 — not R32 (leaves handle that)
          const isPred = m.isPredicted
          drawBadge(x, y, BADGE_R, m.winner, matchScoreStr(m), `w${ji}`,
            isPred?'#c8a830':'#f0c040', isPred?1.5:2, null, hover)

        } else if (d.depth === 4) {
          // R32 junctions: just a dot
          g.append('circle').attr('cx',x).attr('cy',y).attr('r',4).attr('fill', m?.winner?'#f0c040':'#555')

        } else if (m?.home || m?.away) {
          // Two full-size circles side by side along the tangential direction
          const off = BADGE_R * 1.08
          const tx  = -Math.sin(a), ty = Math.cos(a)
          const candidates = [
            { team: m.home??'TBD', ox: -tx*off, oy: -ty*off },
            { team: m.away??'TBD', ox:  tx*off, oy:  ty*off },
          ]
          candidates.forEach((c, ci) => {
            const cx2 = x+c.ox, cy2 = y+c.oy
            const isPredThis = userPredictions[`${d.data.ri}-${d.data.mi}`] === c.team
            const onClick = predictionMode && !m.winner ? () => predictTeam(d.data.ri, d.data.mi, c.team) : null
            drawBadge(cx2, cy2, BADGE_R, c.team, null, `c${ji}-${ci}`,
              isPredThis?'#f0c040':'#666', isPredThis?2.5:1.5, onClick, hover)
          })

        } else {
          g.append('circle').attr('cx',x).attr('cy',y).attr('r',d.depth<=1?7:5).attr('fill','#444')
        }
      })

      // ── Team badges ──
      root.leaves().forEach((d,i)=>{
        const team  = d.data.name
        const a     = d.x - Math.PI/2
        const x     = Math.cos(a)*d.y
        const y     = Math.sin(a)*d.y
        const m     = d.data.match
        const isWin = m?.winner===team
        const isLos = m?.winner&&m.winner!==team&&team!=='TBD'
        const isPred= m?.isPredicted&&isWin
        const click = predictionMode&&!m?.winner&&team!=='TBD'

        const isHome   = team === m?.home
        const myScore  = m?.homeScore !== null ? (isHome ? m?.homeScore : m?.awayScore) : null
        const scoreStr = myScore !== null && myScore !== undefined ? String(myScore) : null
        const stroke   = isWin ? (isPred?'#c8a830':'#f0c040') : '#888'
        const onClick  = click ? ()=>handleClick(d.data) : null
        const hover2   = { over:e=>showTip(e,d.data), move:e=>showTip(e,d.data), out:hideTip }

        const grp = g.append('g').attr('opacity', isLos?0.22:1)
          .attr('class', click?'clickable':'')

        const clipId=`clip-${i}`
        defs.append('clipPath').attr('id',clipId)
          .append('circle').attr('cx',x).attr('cy',y).attr('r',BADGE_R)

        const url=flagUrl(team)
        if(url&&team!=='TBD'){
          grp.append('image').attr('href',url)
            .attr('x',x-BADGE_R).attr('y',y-BADGE_R)
            .attr('width',BADGE_R*2).attr('height',BADGE_R*2)
            .attr('clip-path',`url(#${clipId})`)
            .attr('preserveAspectRatio','xMidYMid slice')
            .attr('pointer-events','none')
        } else {
          grp.append('circle').attr('cx',x).attr('cy',y).attr('r',BADGE_R)
            .attr('fill','#2a2a3e').attr('pointer-events','none')
          grp.append('text').attr('x',x).attr('y',y)
            .attr('text-anchor','middle').attr('dominant-baseline','middle')
            .attr('font-size','14px').attr('fill','#555')
            .attr('pointer-events','none').text('?')
        }

        if (scoreStr) {
          const barH = BADGE_R * 0.42
          grp.append('rect')
            .attr('x',x-BADGE_R).attr('y',y+BADGE_R-barH).attr('width',BADGE_R*2).attr('height',barH)
            .attr('fill','rgba(0,0,0,0.62)').attr('clip-path',`url(#${clipId})`).attr('pointer-events','none')
          grp.append('text')
            .attr('x',x).attr('y',y+BADGE_R-barH/2)
            .attr('text-anchor','middle').attr('dominant-baseline','middle')
            .attr('fill','#fff').attr('font-size',`${Math.max(BADGE_R*0.38,8)}px`).attr('font-weight','bold')
            .attr('clip-path',`url(#${clipId})`).attr('pointer-events','none')
            .text(scoreStr)
        }

        grp.append('circle').attr('cx',x).attr('cy',y).attr('r',BADGE_R)
          .attr('fill','transparent')
          .attr('stroke',stroke).attr('stroke-width', isWin?3:1.5)
          .on('mouseover',hover2.over).on('mousemove',hover2.move).on('mouseleave',hover2.out)
          .on('click', onClick||null)
      })

      // ── Centre: winner flag or trophy ────────────────────────────────────────
      const finalMatch = rounds[rounds.length-1]?.matches[0]
      const champion   = finalMatch?.winner

      if (champion) {
        const cr = BADGE_R * 1.4  // slightly larger at centre
        const url = flagUrl(champion)
        defs.append('clipPath').attr('id','centre-clip')
          .append('circle').attr('r', cr)
        if (url) {
          g.append('image').attr('href', url)
            .attr('x',-cr).attr('y',-cr).attr('width',cr*2).attr('height',cr*2)
            .attr('clip-path','url(#centre-clip)')
            .attr('preserveAspectRatio','xMidYMid slice')
            .attr('pointer-events','none')
        }
        g.append('circle').attr('r', cr)
          .attr('fill','transparent')
          .attr('stroke', finalMatch.isPredicted ? '#c8a830' : '#f0c040')
          .attr('stroke-width', 3)
          .on('mouseover', e => showTip(e, { type:'match', match:finalMatch }))
          .on('mousemove',  e => showTip(e, { type:'match', match:finalMatch }))
          .on('mouseleave', hideTip)
        // Champion name + score below
        const hs = finalMatch.homeScore ?? '–', as = finalMatch.awayScore ?? '–'
        const ex = finalMatch.extra ? ` (${finalMatch.extra})` : ''
        const loser = champion === finalMatch.home ? finalMatch.away : finalMatch.home
        g.append('text').attr('y', cr+14)
          .attr('text-anchor','middle').attr('font-size','11px').attr('font-weight','bold')
          .attr('fill','#f0c040').attr('pointer-events','none')
          .text('🏆 ' + champion)
        g.append('text').attr('y', cr+27)
          .attr('text-anchor','middle').attr('font-size','10px')
          .attr('fill','#888').attr('pointer-events','none')
          .text(`${hs}–${as} vs ${loser}${ex}`)
      } else {
        const tUrl = 'https://dscdn.daily-sun.com/english/uploads/news_photos/2025/12/18/world-cup_1920x1079-6943f968b91cd.jpg'
        const tW = 80, tH = 96
        defs.append('clipPath').attr('id','trophy-clip')
          .append('rect').attr('x',-tW/2).attr('y',-tH/2).attr('width',tW).attr('height',tH)
        const dispW = tW * (1920/(1920*0.28)), dispH = dispW*(1079/1920)
        g.append('image').attr('href',tUrl)
          .attr('x',-dispW/2).attr('y',-dispH/2)
          .attr('width',dispW).attr('height',dispH)
          .attr('clip-path','url(#trophy-clip)')
          .attr('preserveAspectRatio','xMidYMid slice')
          .attr('pointer-events','none')
      }
    }

    function renderGroupTable(g, matches, roundName) {
      // Compute standings
      const teams = {}
      const init = t => { if (!teams[t]) teams[t] = {team:t,p:0,w:0,d:0,l:0,gf:0,ga:0} }
      for (const m of matches) {
        const ft = m.score?.ft
        if (!ft) continue
        init(m.team1); init(m.team2)
        const a = teams[m.team1], b = teams[m.team2]
        a.p++; b.p++; a.gf+=ft[0]; a.ga+=ft[1]; b.gf+=ft[1]; b.ga+=ft[0]
        if (ft[0]>ft[1])      { a.w++; b.l++ }
        else if (ft[0]<ft[1]) { b.w++; a.l++ }
        else                  { a.d++; b.d++ }
      }
      const rows = Object.values(teams)
        .map(t=>({...t, gd:t.gf-t.ga, pts:t.w*3+t.d}))
        .sort((a,b)=>b.pts-a.pts||b.gd-a.gd||b.gf-a.gf)

      const cols = ['Team','P','W','D','L','GF','GA','GD','Pts']
      const colW  = [180,40,40,40,40,40,40,50,50]
      const totalW = colW.reduce((a,b)=>a+b,0)
      const rowH  = 36, headerH = 38
      const tableH = headerH + rows.length * rowH
      const ox = -totalW/2, oy = -tableH/2 - 20

      // Title
      g.append('text').attr('x',0).attr('y',oy-16)
        .attr('text-anchor','middle').attr('fill','#bac2de').attr('font-size','13px')
        .attr('letter-spacing','0.1em').text(roundName.toUpperCase())

      // Header
      g.append('rect').attr('x',ox).attr('y',oy).attr('width',totalW).attr('height',headerH)
        .attr('fill','#313244').attr('rx',4)

      let cx2 = ox
      cols.forEach((col,ci) => {
        g.append('text')
          .attr('x', cx2 + colW[ci]/2).attr('y', oy + headerH/2)
          .attr('text-anchor','middle').attr('dominant-baseline','middle')
          .attr('fill','#a6adc8').attr('font-size','11px').attr('font-weight','bold')
          .text(col)
        cx2 += colW[ci]
      })

      // Rows
      rows.forEach((row,ri) => {
        const ry = oy + headerH + ri * rowH
        g.append('rect').attr('x',ox).attr('y',ry).attr('width',totalW).attr('height',rowH)
          .attr('fill', ri%2===0 ? '#1e1e2e' : '#181825').attr('rx',0)

        // Flag
        const url = flagUrl(row.team)
        if (url) {
          const fh = 14, fw = 21
          g.append('svg:image').attr('href',url)
            .attr('x', ox+8).attr('y', ry+rowH/2-fh/2)
            .attr('width',fw).attr('height',fh)
            .attr('preserveAspectRatio','xMidYMid slice')
          defs.append('clipPath').attr('id',`tc-${ri}`)
            .append('rect').attr('x',ox+8).attr('y',ry+rowH/2-fh/2).attr('width',fw).attr('height',fh)
        }

        const vals = [row.team, row.p, row.w, row.d, row.l, row.gf, row.ga,
                      (row.gd>=0?'+':'')+row.gd, row.pts]
        let cx3 = ox
        vals.forEach((val,ci) => {
          const isTeam = ci===0
          const isBold = ci===8  // Pts
          const fill   = ci===7 ? (row.gd>=0?'#a6e3a1':'#f38ba8') : '#cdd6f4'
          g.append('text')
            .attr('x', isTeam ? cx3+36 : cx3+colW[ci]/2)
            .attr('y', ry + rowH/2)
            .attr('text-anchor', isTeam ? 'start' : 'middle')
            .attr('dominant-baseline','middle')
            .attr('fill', fill).attr('font-size', isTeam?'12px':'12px')
            .attr('font-weight', isBold?'bold':'normal')
            .text(val)
          cx3 += colW[ci]
        })

        // Bottom border
        g.append('line').attr('x1',ox).attr('y1',ry+rowH).attr('x2',ox+totalW).attr('y2',ry+rowH)
          .attr('stroke','#313244').attr('stroke-width',0.5)
      })

      // Match results below
      const mx = ox, my = oy + tableH + 24
      g.append('text').attr('x',0).attr('y',my-4)
        .attr('text-anchor','middle').attr('fill','#585b70').attr('font-size','11px')
        .attr('letter-spacing','0.08em').text('RESULTS')

      matches.forEach((m,mi) => {
        const ft = m.score?.ft
        const score = ft ? `${ft[0]}–${ft[1]}` : 'vs'
        const row2 = Math.floor(mi/2), col2 = mi%2
        const rx2 = ox + col2*(totalW/2), ry2 = my + 10 + row2*22
        g.append('text').attr('x', rx2 + totalW/4).attr('y', ry2)
          .attr('text-anchor','middle').attr('fill','#7f849c').attr('font-size','11px')
          .text(`${m.team1} ${score} ${m.team2}`)
      })
    }

    function redraw(){
      if(!baseAligned)return
      draw(applyPredictions(baseAligned,userPredictions))
    }

    document.getElementById('btn-ai').addEventListener('click',()=>{
      if(!baseAligned)return
      userPredictions = runPredictions(baseAligned, 0.35)
      redraw()
    })
    document.getElementById('btn-flip').addEventListener('click',()=>{
      if(!baseAligned)return
      userPredictions = runPredictions(baseAligned, 0.95)
      redraw()
    })
    document.getElementById('btn-predict').addEventListener('click',()=>{
      predictionMode=!predictionMode
      document.getElementById('btn-predict').classList.toggle('active',predictionMode)
      svg.classed('predict-mode',predictionMode)
      redraw()
    })
    document.getElementById('btn-reset').addEventListener('click',()=>{
      userPredictions={}; redraw()
    })

    // ── Year selector ─────────────────────────────────────────────────────────
    const sel = document.getElementById('year-select')
    TOURNAMENTS.forEach(t => {
      const o = document.createElement('option')
      o.value = t.year
      o.textContent = `${t.year} — ${t.host}`
      if (t.year === 2026) o.selected = true
      sel.appendChild(o)
    })

    async function loadYear(year) {
      try {
        document.getElementById('title').textContent = `World Cup ${year}`
        const res  = await fetch(dataUrl(year))
        const json = await res.json()
        ROUND_CONFIG = detectRoundConfig(json)
        RADII        = buildRadii(ROUND_CONFIG.length)
        userPredictions = {}
        predictionMode  = false
        document.getElementById('btn-predict').classList.remove('active')
        svg.classed('predict-mode', false)
        if (ROUND_CONFIG.length === 0) {
          g.selectAll('*').remove()
          // Try to render a group stage table if data exists
          const groupRounds = { 1950: 'Final Round', 1974: 'Second round', 1978: 'Second round' }
          const groupKey = Object.keys(groupRounds).find(y => Number(y) === year)
          if (groupKey) {
            const groupMatches = json.matches.filter(m => m.round === groupRounds[groupKey])
            if (groupMatches.length > 0) {
              renderGroupTable(g, groupMatches, groupRounds[groupKey])
              return
            }
          }
          g.append('text').attr('fill','#cdd6f4').attr('text-anchor','middle')
            .attr('dominant-baseline','middle').attr('font-size','14px')
            .text('No bracket data for this year')
          return
        }
        baseAligned = propagateWinners(alignBracket(parseRounds(json)))
        redraw()
      } catch(e) { console.error(e) }
    }

    sel.addEventListener('change', e => loadYear(Number(e.target.value)))
    loadYear(2026)
  </script>
</body>
